services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rag_app
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/rag_db
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/rag_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./knowledge_base:/app/knowledge_base:ro
      # отчёты batch_eval_rostrud сразу на хосте (JSONL/CSV/RAGAS)
      - ./evaluation/reports:/app/evaluation/reports
    command: ["python", "-m", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]

  bot:
    build: .
    container_name: rag_bot
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/rag_db
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/rag_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./knowledge_base:/app/knowledge_base:ro
      - ./logs:/app/logs
    command: ["python", "-m", "scripts.run_bot"]

  redis:
    image: redis:7-alpine
    container_name: rag_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
